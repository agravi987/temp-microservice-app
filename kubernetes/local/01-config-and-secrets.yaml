apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: microservices-local
data:
  POSTGRES_DB: microservices_db
  POSTGRES_USER: app_user
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: microservices-local
type: Opaque
stringData:
  POSTGRES_PASSWORD: change_me_for_local_only
  JWT_SECRET: local_kubernetes_secret_change_later
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: microservices-local
data:
  01-create-tables.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      name VARCHAR(120) NOT NULL,
      email VARCHAR(160) NOT NULL UNIQUE,
      password_hash TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS products (
      id SERIAL PRIMARY KEY,
      name VARCHAR(160) NOT NULL UNIQUE,
      price INTEGER NOT NULL CHECK (price >= 0),
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      user_id INTEGER NOT NULL,
      product_id INTEGER NOT NULL,
      quantity INTEGER NOT NULL CHECK (quantity > 0),
      status VARCHAR(40) NOT NULL DEFAULT 'CREATED',
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO products (name, price)
    VALUES
      ('Laptop', 75000),
      ('Keyboard', 2500),
      ('Mouse', 1200)
    ON CONFLICT DO NOTHING;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: microservices-local
data:
  nginx.conf: |
    events {}

    http {
      upstream frontend {
        server frontend:5173;
      }

      upstream auth_service {
        server auth-service:3001;
      }

      upstream product_service {
        server product-service:3002;
      }

      upstream order_service {
        server order-service:3003;
      }

      server {
        listen 80;

        location = /api/auth/health {
          proxy_pass http://auth_service/health;
        }

        location = /api/products/health {
          proxy_pass http://product_service/health;
        }

        location = /api/orders/health {
          proxy_pass http://order_service/health;
        }

        location /api/auth/ {
          rewrite ^/api/auth/(.*)$ /auth/$1 break;
          proxy_pass http://auth_service;
        }

        location = /api/products {
          proxy_pass http://product_service/products;
        }

        location /api/products/ {
          rewrite ^/api/products/(.*)$ /products/$1 break;
          proxy_pass http://product_service;
        }

        location = /api/orders {
          proxy_pass http://order_service/orders;
        }

        location /api/orders/ {
          rewrite ^/api/orders/(.*)$ /orders/$1 break;
          proxy_pass http://order_service;
        }

        location / {
          proxy_pass http://frontend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
        }
      }
    }
